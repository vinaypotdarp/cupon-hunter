<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CouponHunter — Before you buy, check here</title>
<meta name="description" content="The world's easiest way to save money online. Search any store or product — we check every coupon source at once.">
<style>
  :root {
    color-scheme: light dark;
    --bg:#fafaf8; --fg:#16161a; --mut:#71717a; --card:#ffffff; --line:#e8e8e4;
    --acc:#c96f2b; --acc2:#b45f1f; --grn:#16a34a; --grnbg:#f0fdf4; --amb:#fef3c7; --ambfg:#b45309;
    --sh:0 1px 3px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.04);
  }
  [data-theme=dark] {
    --bg:#111114; --fg:#f2f2f0; --mut:#9b9ba3; --card:#1b1b20; --line:#2a2a30;
    --grnbg:#122a1a; --amb:#2e2410; --sh:0 1px 3px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;transition:background .3s}
  .wrap{max-width:840px;margin:0 auto;padding:0 20px 80px}
  header{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
  .logo{font-weight:800;font-size:18px;letter-spacing:-.02em}
  .logo span{color:var(--acc)}
  #themeBtn{background:none;border:1px solid var(--line);border-radius:999px;width:38px;height:38px;font-size:16px;cursor:pointer;color:var(--fg)}
  .hero{text-align:center;padding:9vh 0 26px;transition:padding .4s}
  .hero.compact{padding:8px 0 18px}
  .hero h1{font-size:clamp(30px,5.5vw,46px);letter-spacing:-.03em;font-weight:800;line-height:1.1}
  .hero h1 em{font-style:normal;color:var(--acc)}
  .hero p{color:var(--mut);margin-top:12px;font-size:16px}
  .hero.compact h1{font-size:24px}
  .hero.compact p{display:none}
  .sbox{position:relative;margin:30px auto 0;max-width:640px}
  .hero.compact .sbox{margin-top:14px}
  #q{width:100%;padding:19px 130px 19px 54px;font-size:17px;border:1.5px solid var(--line);border-radius:999px;outline:none;background:var(--card);color:var(--fg);box-shadow:var(--sh);transition:border .2s,box-shadow .2s}
  #q:focus{border-color:var(--acc);box-shadow:0 0 0 4px rgba(201,111,43,.12),var(--sh)}
  .sico{position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}
  #goBtn{position:absolute;right:7px;top:7px;bottom:7px;padding:0 24px;font-size:15px;font-weight:700;color:#fff;background:var(--acc);border:none;border-radius:999px;cursor:pointer;transition:background .2s,transform .1s}
  #goBtn:hover{background:var(--acc2)}
  #goBtn:active{transform:scale(.96)}
  #ac{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh);overflow:hidden;display:none;z-index:30;text-align:left}
  #ac div{padding:11px 22px;cursor:pointer;font-size:15px}
  #ac div.on,#ac div:hover{background:rgba(201,111,43,.09)}
  #ac b{color:var(--acc)}
  .trend{margin-top:26px;font-size:13px;color:var(--mut)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 15px;font-size:13.5px;cursor:pointer;color:var(--fg);transition:border .15s,color .15s}
  .chip:hover{border-color:var(--acc);color:var(--acc)}
  #stat{display:none;gap:8px;flex-wrap:wrap;margin:8px 0 16px}
  #agent{display:none;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 20px;margin:8px 0 16px}
  #agent .at{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);margin-bottom:8px}
  #agent .stp{display:flex;align-items:center;gap:9px;padding:4px 0;font-size:13.5px;color:var(--mut)}
  #agent .stp.on{color:var(--fg)}
  #agent .stp.ok{color:var(--grn)}
  .ways{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 22px 14px;box-shadow:var(--sh)}
  .way{padding:13px 0;border-bottom:1px dashed var(--line)}
  .way:last-child{border-bottom:none}
  .way b{font-size:14.5px}
  .way p{font-size:13.5px;color:var(--mut);margin-top:3px;line-height:1.5}
  .way .tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-radius:6px;padding:2px 8px;margin-left:8px;vertical-align:middle;color:#2563eb;background:rgba(59,130,246,.12)}
  .rsn{font-size:12px;color:var(--grn);margin-top:8px}
  .cbadge{display:inline-block;font-size:12px;font-weight:800;color:var(--grn);background:var(--grnbg);border-radius:999px;padding:3px 12px;margin-left:8px;vertical-align:middle}
  .pv{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:4px 12px;color:var(--mut);display:flex;align-items:center;gap:6px}
  .pv.done{color:var(--grn);border-color:var(--grn)}
  .pv.fail{opacity:.45;text-decoration:line-through}
  .sp{width:10px;height:10px;border:2px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  #best{display:none;background:linear-gradient(135deg,rgba(201,111,43,.10),rgba(201,111,43,.03));border:1.5px solid var(--acc);border-radius:22px;padding:20px 24px;margin-bottom:18px;animation:in .4s}
  #best .bt{font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--acc);text-transform:uppercase}
  #best h3{font-size:19px;margin:6px 0 4px}
  #best p{font-size:14px;color:var(--mut)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px 22px;margin-bottom:12px;box-shadow:var(--sh);display:flex;justify-content:space-between;gap:16px;align-items:flex-start;animation:in .35s}
  @keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .disc{font-size:17px;font-weight:800;letter-spacing:-.01em}
  .desc{font-size:14px;color:var(--mut);margin-top:5px;line-height:1.5}
  .meta{font-size:12px;color:var(--mut);margin-top:9px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .meta a{color:var(--acc);text-decoration:none}
  .vb{font-size:11px;font-weight:700;color:var(--grn);background:var(--grnbg);border-radius:6px;padding:2px 8px}
  .cf{font-size:11px;color:var(--ambfg);background:var(--amb);border-radius:6px;padding:2px 8px}
  .bo{font-size:11px;font-weight:600;color:#2563eb;background:rgba(59,130,246,.12);border-radius:6px;padding:2px 8px}
  .hs{font-size:11px;font-weight:800;border-radius:6px;padding:2px 8px}
  .hs.g{color:var(--grn);background:var(--grnbg)}
  .hs.a{color:var(--ambfg);background:var(--amb)}
  .hs.x{color:var(--mut);background:var(--line)}
  .provs{font-size:11.5px;color:var(--mut)}
  .provs b{color:var(--fg);font-weight:600}
  #mic{position:absolute;right:118px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:17px;cursor:pointer;opacity:.65;z-index:5}
  #mic:hover{opacity:1}
  #mic.rec{animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.25}}
  .bk{width:100%;border-collapse:collapse;margin-top:12px;font-size:13.5px}
  .bk td{padding:5px 0;border-bottom:1px dashed var(--line)}
  .bk td:last-child{text-align:right;font-weight:700}
  .alt{margin-top:12px;font-size:13.5px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:12px;padding:10px 14px}
  .acx{display:flex;align-items:center;gap:10px}
  .acx .cat{margin-left:auto;font-size:11px;color:var(--mut);background:var(--line);border-radius:6px;padding:1px 8px}
  .codebox{flex-shrink:0;border:1.5px dashed var(--acc);border-radius:12px;padding:9px 14px;font-family:ui-monospace,Menlo,monospace;font-size:14px;font-weight:700;color:var(--acc);background:rgba(201,111,43,.05);cursor:pointer;text-align:center;transition:transform .1s}
  .codebox:active{transform:scale(.94)}
  .codebox small{display:block;font-size:10px;color:var(--mut);font-weight:500;margin-top:2px}
  .nocode{flex-shrink:0;font-size:12px;font-weight:600;color:var(--grn);background:var(--grnbg);border-radius:10px;padding:8px 12px}
  .skel{height:92px;border-radius:20px;background:linear-gradient(90deg,var(--card),var(--line),var(--card));background-size:200% 100%;animation:sk 1.2s infinite;margin-bottom:12px;border:1px solid var(--line)}
  @keyframes sk{to{background-position:-200% 0}}
  .sect{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:28px 0 12px}
  .empty{text-align:center;color:var(--mut);padding:28px 0;font-size:14.5px}
  footer{margin-top:56px;text-align:center;font-size:12.5px;color:var(--mut)}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);font-size:13px;font-weight:600;padding:10px 20px;border-radius:999px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  .conf{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:55;animation:fall 1s ease-out forwards}
  @keyframes fall{to{transform:translateY(120px) rotate(340deg);opacity:0}}
  @media(max-width:560px){.card{flex-direction:column}.codebox{align-self:stretch}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🏷️ Coupon<span>Hunter</span></div>
    <button id="themeBtn" title="Toggle dark mode">🌙</button>
  </header>

  <div class="hero" id="hero">
    <h1>Before you buy, <em>check here.</em></h1>
    <p>Never overpay again. One search — coupons, cashback routes, card offers, cheaper stores — ranked for you.</p>
    <div class="sbox">
      <span class="sico">🔍</span>
      <input id="q" autocomplete="off" spellcheck="false" placeholder="What are you buying today?">
      <button id="mic" title="Voice search">🎤</button>
      <button id="goBtn">Find savings</button>
      <div id="ac"></div>
    </div>
    <div class="trend" id="trendWrap">Trending today
      <div class="chips" id="trend"></div>
    </div>
    <div class="chips" id="recent" style="margin-top:10px"></div>
  </div>

  <div id="agent"></div>
  <div id="stat"></div>
  <div id="best"></div>
  <div id="out"></div>
  <div id="extra"></div>
  <footer>Codes change fast — always confirm the discount at checkout. Made with CouponHunter.</footer>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
const $=i=>document.getElementById(i);
const ROT=["Nike shoes","iPhone 17","MacBook Air","Amazon","Flipkart","Myntra","Ajio","Zara","Dominos","Swiggy","MakeMyTrip","Samsung","Boat","Mamaearth","Nykaa","Spotify","Netflix","Udemy","Hostinger","Adidas"];
const SUG=[["Nike","👟","Brand"],["Nike Shoes","👟","Product"],["Nike Running Shoes","👟","Product"],["Nike Air Max","👟","Product"],["Adidas","👟","Brand"],["Puma","👟","Brand"],["Amazon","🛒","Store"],["Flipkart","🛒","Store"],["Myntra","👗","Store"],["Ajio","👗","Store"],["Nykaa","💄","Store"],["Zara","👗","Brand"],["H&M","👗","Brand"],["Levis","👖","Brand"],["iPhone 16","📱","Product"],["iPhone 17","📱","Product"],["iPhone Case","📱","Product"],["AirPods Pro","🎧","Product"],["MacBook Air","💻","Product"],["Apple","🍎","Brand"],["Apple Student Discount","🍎","Deal"],["Samsung","📱","Brand"],["OnePlus","📱","Brand"],["Boat","🎧","Brand"],["Laptop","💻","Category"],["HP Laptop","💻","Product"],["Dell Laptop","💻","Product"],["Lenovo","💻","Brand"],["Headphones","🎧","Category"],["Smartwatch","⌚","Category"],["Shoes","👟","Category"],["Sneakers","👟","Category"],["T-shirt","👕","Category"],["Jeans","👖","Category"],["Watches","⌚","Category"],["Perfume","🌸","Category"],["Mamaearth","🌿","Brand"],["Sephora","💄","Store"],["Sugar Cosmetics","💄","Brand"],["Dominos","🍕","Food"],["Pizza Hut","🍕","Food"],["Swiggy","🍔","Food"],["Zomato","🍔","Food"],["KFC","🍗","Food"],["McDonalds","🍔","Food"],["BigBasket","🥦","Grocery"],["Blinkit","🥦","Grocery"],["Zepto","🥦","Grocery"],["MakeMyTrip","✈️","Travel"],["Goibibo","✈️","Travel"],["Booking.com","🏨","Travel"],["Ixigo","🚆","Travel"],["Uber","🚕","Travel"],["Ola","🚕","Travel"],["Netflix","🎬","Subscription"],["Spotify","🎵","Subscription"],["YouTube Premium","🎬","Subscription"],["Hotstar","🎬","Subscription"],["Udemy","📚","Learning"],["Coursera","📚","Learning"],["Hostinger","🌐","Tech"],["Namecheap","🌐","Tech"],["GoDaddy","🌐","Tech"],["Adobe","🎨","Tech"],["Canva","🎨","Tech"],["Steam","🎮","Gaming"],["Epic Games","🎮","Gaming"],["Croma","🔌","Store"],["Reliance Digital","🔌","Store"],["Vijay Sales","🔌","Store"],["Tata Cliq","🛒","Store"],["Meesho","🛒","Store"],["Snapdeal","🛒","Store"],["FirstCry","🍼","Store"],["Pharmeasy","💊","Health"],["1mg","💊","Health"],["Cultfit","🏋️","Health"],["Decathlon","⚽","Store"],["Lenskart","👓","Store"],["Titan","⌚","Brand"],["Fastrack","⌚","Brand"],["Ikea","🛋️","Store"],["Pepperfry","🛋️","Store"],["Urban Company","🔧","Service"]];
const TREND=["🔥 Amazon","🔥 Myntra Sale","🔥 Flipkart Electronics","🔥 Nike","🔥 Apple","🔥 Swiggy"];
const PROVS=["grabon","desidime","coupondunia","wethrift","ddg"];
const PNAME={grabon:"GrabOn",desidime:"DesiDime",coupondunia:"CouponDunia",wethrift:"Wethrift",ddg:"Web search",web:"Web"};
let seen=new Set(),all=[],srcMap={},running=0,curQuery="";

/* theme */
const th=localStorage.getItem("ch_theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
document.documentElement.dataset.theme=th;$("themeBtn").textContent=th==="dark"?"☀️":"🌙";
$("themeBtn").onclick=()=>{const t=document.documentElement.dataset.theme==="dark"?"light":"dark";document.documentElement.dataset.theme=t;localStorage.setItem("ch_theme",t);$("themeBtn").textContent=t==="dark"?"☀️":"🌙"};

/* rotating placeholder */
let ri=0;setInterval(()=>{if(document.activeElement!==$("q")&&!$("q").value){ri=(ri+1)%ROT.length;$("q").placeholder=ROT[ri]+" …"}},3000);

/* trending + recent */
$("trend").innerHTML=TREND.map(t=>`<span class="chip" onclick="go('${t.replace("🔥 ","")}')">${t}</span>`).join("");
function drawRecent(){try{const r=JSON.parse(localStorage.getItem("ch_recent")||"[]");$("recent").innerHTML=r.map(x=>`<span class="chip">↩ ${esc(x)}</span>`).join("");[...$("recent").children].forEach((c,i)=>c.onclick=()=>go(r[i]))}catch{}}
drawRecent();

/* autocomplete + instant search */
let acIdx=-1,acVals=[],debT=null,qCache=new Map();
$("q").addEventListener("input",()=>{
  const v=$("q").value.trim().toLowerCase();acIdx=-1;
  clearTimeout(debT);
  if(v.length>=5&&!/^https?:/i.test(v))debT=setTimeout(()=>{if($("q").value.trim().toLowerCase()===v&&$("ac").style.display==="none")go($("q").value,true)},2500);
  if(v.length<2){$("ac").style.display="none";return}
  let recents=[];try{recents=JSON.parse(localStorage.getItem("ch_recent")||"[]").filter(r=>r.toLowerCase().includes(v)).slice(0,2).map(r=>[r,"↩","Recent"])}catch{}
  const m=[...recents,...SUG.filter(s=>s[0].toLowerCase().includes(v)).slice(0,8-recents.length)];
  if(!m.length){$("ac").style.display="none";return}
  acVals=m.map(s=>s[0]);
  const rx=new RegExp("("+v.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","i");
  $("ac").innerHTML=m.map(s=>`<div class="acx"><span>${s[1]}</span><span>${esc(s[0]).replace(rx,"<b>$1</b>")}</span><span class="cat">${s[2]}</span></div>`).join("");
  [...$("ac").children].forEach((el,i)=>el.onclick=()=>{$("q").value=acVals[i];$("ac").style.display="none";go(acVals[i])});
  $("ac").style.display="block";
});
$("q").addEventListener("keydown",e=>{
  const items=[...$("ac").children];
  if(e.key==="ArrowDown"&&items.length){e.preventDefault();acIdx=(acIdx+1)%items.length}
  else if(e.key==="ArrowUp"&&items.length){e.preventDefault();acIdx=(acIdx-1+items.length)%items.length}
  else if(e.key==="Enter"){$("ac").style.display="none";go(acIdx>=0&&acVals[acIdx]?acVals[acIdx]:$("q").value);return}
  else if(e.key==="Escape"){$("ac").style.display="none";return}
  else return;
  items.forEach((el,i)=>el.classList.toggle("on",i===acIdx));
});
document.addEventListener("click",e=>{if(!e.target.closest(".sbox"))$("ac").style.display="none"});
$("goBtn").onclick=()=>go($("q").value);

/* voice search */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR)$("mic").style.display="none";
else $("mic").onclick=()=>{
  const r=new SR();r.lang="en-IN";r.interimResults=false;
  $("mic").classList.add("rec");
  r.onresult=e=>{const t=e.results[0][0].transcript.replace(/find me|best coupon for|coupons? for|search/gi,"").trim();$("q").value=t;go(t)};
  r.onend=()=>$("mic").classList.remove("rec");r.onerror=()=>$("mic").classList.remove("rec");
  r.start();
};

function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML}

function parseUrl(raw){
  try{const u=new URL(/^https?:\/\//i.test(raw)?raw:"https://"+raw);
    const store=u.hostname.replace(/^www\./,"").split(".")[0];
    const slug=decodeURIComponent(u.pathname).split("/").filter(Boolean).map(s=>s.replace(/[-_+]/g," "))
      .filter(s=>s.length>8&&!/^\d+$/.test(s)).sort((a,b)=>b.length-a.length)[0];
    return{store,product:slug?slug.replace(/\b[a-z0-9]{10,}\b/gi,"").replace(/\s+/g," ").trim().slice(0,60):null}
  }catch{return null}
}

let lastQ="";
async function go(raw,auto){
  raw=String(raw||"").trim();if(!raw)return;
  if(auto&&raw.toLowerCase()===lastQ)return;
  lastQ=raw.toLowerCase();clearTimeout(debT);
  $("q").value=raw;$("ac").style.display="none";curQuery=raw;
  $("hero").classList.add("compact");$("trendWrap").style.display="none";
  $("best").style.display="none";$("out").innerHTML='<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
  $("extra").innerHTML="";
  $("stat").style.display="flex";$("stat").innerHTML="";
  seen=new Set();all=[];srcMap={};running=0;byKey.clear();window._extra=null;
  agentInit(["Understanding what you're buying","Identifying brand & best stores","Checking coupon providers","Checking cashback & bank-offer routes","Comparing & ranking every way to save"]);
  agentStep(0,"on");

  let stores=[],product=null;
  const u=/^https?:\/\//i.test(raw)||/^[a-z0-9-]+\.[a-z.]{2,6}(\/|$)/i.test(raw)?parseUrl(raw):null;
  if(u){stores=[u.store];product=u.product}
  else if(!/\s/.test(raw)||SUG.some(s=>s[0].toLowerCase()===raw.toLowerCase()&&/Store|Brand|Food|Travel|Subscription|Tech|Health|Service|Grocery|Learning|Gaming/.test(s[2]))){
    stores=[raw.toLowerCase().replace(/[^a-z0-9]+/g,"-")]; // plain store/brand — save an AI call
  }else{
    try{const r=await fetch("/api/find?mode=expand&q="+encodeURIComponent(raw));const j=await r.json();
      stores=(j.stores||[]).slice(0,2);product=j.product||null;
    }catch{}
    if(!stores.length)stores=[raw.toLowerCase().replace(/[^a-z0-9]+/g,"-")];
  }
  if(!auto)try{let r=JSON.parse(localStorage.getItem("ch_recent")||"[]");r=[raw,...r.filter(x=>x!==raw)].slice(0,6);localStorage.setItem("ch_recent",JSON.stringify(r));drawRecent()}catch{}

  agentStep(0,"ok");agentStep(1,"ok");agentStep(2,"on");agentStep(3,"on");
  stores=stores.slice(0,2);running=stores.length;window._best=null;
  stores.forEach(s=>{
    const id="pv_st_"+s.replace(/[^a-z0-9]/g,"");
    $("stat").insertAdjacentHTML("beforeend",`<span class="pv" id="${id}"><span class="sp"></span>Searching ${esc(s)} across all sources…</span>`);
    fetch(`/api/find?store=${encodeURIComponent(s)}${product?"&product="+encodeURIComponent(product):""}`)
      .then(r=>r.json()).then(d=>fin(id,d,s)).catch(()=>fin(id,{coupons:[]},s));
  });
}

const byKey=new Map();
function fin(id,d,s){
  const el=$(id);
  if(el){
    el.querySelector(".sp")?.remove();
    const st=d.status||{};
    el.classList.add((d.coupons||[]).length?"done":"fail");
    el.innerHTML=`${(d.coupons||[]).length?"✓":"✕"} ${esc(s)}: `+Object.keys(st).map(p=>`${st[p]==="ok"?"✅":"⛔"} ${esc(PNAME[p]||p)}`).join(" ");
  }
  if(d.best&&!window._best)window._best=d.best;
  if(!window._extra&&((d.otherWays||[]).length||(d.alternatives||[]).length))window._extra={ways:d.otherWays||[],alts:d.alternatives||[]};
  (d.coupons||[]).forEach(c=>{
    const k=(c.code?c.code:(c.discount||"")).toLowerCase().replace(/\s+/g,"");
    const pn=PNAME[c.provider]||c.provider||"web";
    const ex=byKey.get(k);
    if(ex){
      if(!ex._provs.includes(pn))ex._provs.push(pn);
      ex.verified=ex.verified||c.verified;
      ex.confidence=Math.max(ex.confidence||0,c.confidence||0);
      ex.bankOffer=ex.bankOffer||c.bankOffer;
      return;
    }
    c._src=c.sourceUrl||"";c._provs=[pn];c._store=s;
    byKey.set(k,c);all.push(c);
  });
  render();
  if(--running===0)done();
}

function health(c){
  return Math.min(100,Math.round((c.verified?40:12)+(c.confidence||50)*0.3+Math.min((c._provs||[]).length*10,20)+(c.code?8:4)+(c.expiry?6:0)));
}
function score(c){return health(c)+(((/\d+/.exec(c.discount||"")||[0])[0]>50)?8:0)}

function render(){
  if(!all.length){$("out").innerHTML=running?'<div class="skel"></div><div class="skel"></div>':'<div class="empty">No live coupon codes right now — but you can still pay less. Here\'s your savings plan: ↓</div>';return}
  const sorted=[...all].sort((a,b)=>score(b)-score(a));
  $("out").innerHTML=sorted.map((c,i)=>`
    <div class="card">
      <div>
        <div class="disc">${esc(c.discount||"Deal")}</div>
        <div class="desc">${esc(c.description||"")}</div>
        <div class="meta">
          <span class="hs ${health(c)>=80?"g":health(c)>=60?"a":"x"}">${health(c)}/100</span>
          ${c.verified?'<span class="vb">✓ Verified</span>':""}
          ${c.bankOffer?`<span class="bo">🏦 ${esc(c.bankOffer)}</span>`:""}
          <span>${esc(c._store)}</span>
          ${c.expiry?`<span>Expires ${esc(c.expiry)}</span>`:""}
          ${c._src?`<a href="${esc(c._src)}" target="_blank" rel="noopener">source</a>`:""}
          <span class="provs">${(c._provs||[]).length>1?`Confirmed by <b>${(c._provs||[]).length} providers</b> · `:""}${esc((c._provs||[]).join(" · "))}</span>
        </div>
      </div>
      ${c.code?`<div class="codebox" data-code="${esc(c.code)}">${esc(c.code)}<small>TAP TO COPY</small></div>`:'<div class="nocode">No code needed</div>'}
    </div>`).join("")+(running?'<div class="skel"></div>':"");
  document.querySelectorAll(".codebox").forEach(b=>b.onclick=e=>copy(b.dataset.code,e));
}

function agentInit(steps){
  $("agent").innerHTML='<div class="at">🤖 AI Shopping Agent</div>'+steps.map((s,i)=>`<div class="stp" id="ag${i}"><span id="agi${i}">○</span> ${esc(s)}</div>`).join("");
  $("agent").style.display="block";
}
function agentStep(i,st){
  const el=$("ag"+i);if(!el)return;
  el.className="stp "+st;
  $("agi"+i).textContent=st==="ok"?"✓":st==="on"?"◌":"○";
}

const FALLBACK_WAYS=s=>[
  {title:"Route through a cashback portal",how:`Open ${s} via CashKaro or a similar cashback site before buying — you earn a % back on top of any other discount.`,type:"cashback"},
  {title:"Check card offers at checkout",how:`${s} usually lists live bank/card offers on the payment page — check before paying, they stack with sale prices.`,type:"bank"},
  {title:"First-order & newsletter discounts",how:`Sign up for ${s}'s newsletter or app — first-order codes are common and often 10-15%.`,type:"newsletter"},
  {title:"Time it with a sale",how:"Big Indian sales (month-end, festive, payday) reliably cut 10-40%. If you can wait days, set a reminder.",type:"timing"},
];

function renderExtra(){
  const x=window._extra||{ways:FALLBACK_WAYS(curQuery),alts:[]};
  let h="";
  if((x.alts||[]).length){
    h+='<div class="sect">Cheaper elsewhere?</div><div class="ways">'+x.alts.map(a=>`<div class="way"><b>${esc(a.store)}</b><p>${esc(a.why||"")}</p></div>`).join("")+"</div>";
  }
  const ways=(x.ways&&x.ways.length?x.ways:FALLBACK_WAYS(curQuery));
  h+='<div class="sect">More ways to save — beyond coupons</div><div class="ways">'+
    ways.map(w=>`<div class="way"><b>${esc(w.title)}</b><span class="tag">${esc(w.type||"tip")}</span><p>${esc(w.how||"")}</p></div>`).join("")+"</div>";
  $("extra").innerHTML=h;
}

function done(){
  agentStep(2,"ok");agentStep(3,"ok");agentStep(4,"ok");
  setTimeout(()=>{$("agent").style.display="none"},900);
  render();
  renderExtra();
  const b=window._best;
  if(b&&b.headline){
    $("best").innerHTML=`<div class="bt">✨ Best purchase strategy</div>
      <h3>${esc(b.headline)}${b.confidence?`<span class="cbadge">${Math.round(b.confidence)}% confidence</span>`:""}</h3>
      <p>${esc(b.reason||"")}</p>
      ${Array.isArray(b.breakdown)&&b.breakdown.length?`<table class="bk">${b.breakdown.map(r=>`<tr><td>${esc(r.label)}</td><td>${esc(r.value)}</td></tr>`).join("")}</table>`:""}
      ${b.code?`<div class="codebox" style="display:inline-block;margin-top:12px" data-code="${esc(b.code)}">${esc(b.code)}<small>TAP TO COPY</small></div>`:""}
      ${Array.isArray(b.reasons)&&b.reasons.length?`<div class="rsn">✓ ${b.reasons.map(esc).join(" &nbsp;✓ ")}</div>`:""}`;
    $("best").style.display="block";
    const cb=$("best").querySelector(".codebox");if(cb)cb.onclick=e=>copy(cb.dataset.code,e);
  }
}

function copy(code,e){
  navigator.clipboard.writeText(code).then(()=>{
    $("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1300);
    const x=e?e.clientX:innerWidth/2,y=e?e.clientY:innerHeight/2,cols=["#c96f2b","#16a34a","#eab308","#3b82f6","#ec4899"];
    for(let i=0;i<14;i++){const p=document.createElement("div");p.className="conf";
      p.style.cssText=`left:${x+(Math.random()*60-30)}px;top:${y-10}px;background:${cols[i%5]};animation-delay:${Math.random()*.15}s`;
      document.body.appendChild(p);setTimeout(()=>p.remove(),1200)}
  });
}
</script>
</body>
</html>
